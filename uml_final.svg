<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .title { font: bold 22px Arial, sans-serif; fill: #17324d; }
    .box { fill: #f8fbff; stroke: #2b5d82; stroke-width: 2; rx: 10; ry: 10; }
    .header { fill: #d8ebf7; stroke: #2b5d82; stroke-width: 2; rx: 10; ry: 10; }
    .class-name { font: bold 18px Arial, sans-serif; fill: #17324d; }
    .text { font: 14px Arial, sans-serif; fill: #17324d; }
    .line { stroke: #2b5d82; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #7a8fa3; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowGray); }
    .label { font: italic 13px Arial, sans-serif; fill: #3f566b; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 z" fill="#2b5d82"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 z" fill="#7a8fa3"/>
    </marker>
  </defs>
  <text x="30" y="40" class="title">PawPal+ Final UML</text>
  <rect x="40" y="80" width="280" height="245" class="box"/>
  <rect x="40" y="80" width="280" height="44" class="header"/>
  <text x="150" y="108" text-anchor="middle" class="class-name">Owner</text>
  <text x="55" y="145" class="text">+ name: str</text>
  <text x="55" y="168" class="text">+ available_minutes: int</text>
  <text x="55" y="191" class="text">+ preferences: list[str]</text>
  <text x="55" y="214" class="text">+ pets: list[Pet]</text>
  <text x="55" y="250" class="text">+ add_pet(pet: Pet)</text>
  <text x="55" y="273" class="text">+ update_available_time(minutes: int)</text>
  <text x="55" y="296" class="text">+ get_pet(pet_name: str)</text>
  <text x="55" y="319" class="text">+ get_all_tasks()</text>
  <rect x="40" y="390" width="280" height="260" class="box"/>
  <rect x="40" y="390" width="280" height="44" class="header"/>
  <text x="150" y="418" text-anchor="middle" class="class-name">Pet</text>
  <text x="55" y="455" class="text">+ name: str</text>
  <text x="55" y="478" class="text">+ species: str</text>
  <text x="55" y="501" class="text">+ age: int</text>
  <text x="55" y="524" class="text">+ care_notes: str</text>
  <text x="55" y="547" class="text">+ tasks: list[Task]</text>
  <text x="55" y="583" class="text">+ add_task(task: Task)</text>
  <text x="55" y="606" class="text">+ remove_task(task_title: str)</text>
  <text x="55" y="629" class="text">+ get_pending_tasks()</text>
  <rect x="455" y="80" width="330" height="350" class="box"/>
  <rect x="455" y="80" width="330" height="44" class="header"/>
  <text x="620" y="108" text-anchor="middle" class="class-name">Task</text>
  <text x="470" y="145" class="text">+ title: str</text>
  <text x="470" y="168" class="text">+ duration_minutes: int</text>
  <text x="470" y="191" class="text">+ priority: str</text>
  <text x="470" y="214" class="text">+ category: str</text>
  <text x="470" y="237" class="text">+ scheduled_time: str</text>
  <text x="470" y="260" class="text">+ frequency: str</text>
  <text x="470" y="283" class="text">+ preferred_time: Optional[str]</text>
  <text x="470" y="306" class="text">+ completed: bool</text>
  <text x="470" y="329" class="text">+ due_date: date</text>
  <text x="470" y="365" class="text">+ mark_complete()</text>
  <text x="470" y="388" class="text">+ matches_time_preference(time_block: str)</text>
  <text x="470" y="411" class="text">+ next_occurrence()</text>
  <rect x="850" y="140" width="310" height="340" class="box"/>
  <rect x="850" y="140" width="310" height="44" class="header"/>
  <text x="1005" y="168" text-anchor="middle" class="class-name">Scheduler</text>
  <text x="865" y="205" class="text">+ create_daily_plan(owner: Owner)</text>
  <text x="865" y="228" class="text">+ sort_by_time(tasks: list[Task])</text>
  <text x="865" y="251" class="text">+ prioritize_tasks(tasks: list[Task])</text>
  <text x="865" y="274" class="text">+ filter_tasks(owner, pet_name, completed)</text>
  <text x="865" y="297" class="text">+ filter_tasks_by_time(tasks, available_minutes)</text>
  <text x="865" y="320" class="text">+ detect_conflicts(owner: Owner)</text>
  <text x="865" y="343" class="text">+ explain_plan(selected_tasks, owner)</text>
  <path d="M180 325 L180 390" class="line"/>
  <text x="193" y="360" class="label">1 has *</text>
  <path d="M320 520 L455 255" class="line"/>
  <text x="338" y="372" class="label">1 manages *</text>
  <path d="M785 250 L850 250" class="dash"/>
  <text x="792" y="236" class="label">uses</text>
  <path d="M850 290 L320 210" class="dash"/>
  <text x="625" y="226" class="label">reads owner data</text>
</svg>
